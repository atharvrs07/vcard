<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account - Digital vCard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    body {
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
    }
    .auth-wrap {
      max-width: 460px;
      margin: 5rem auto;
      background: #111827;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 16px 44px rgba(2, 6, 23, 0.55);
    }
    .muted {
      color: #94a3b8;
    }
    #auth-message {
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <h1 class="h4 mb-2" id="auth-title">Create your account</h1>
    <p class="muted mb-4" id="auth-subtitle">Sign up first so your card is saved in your account and never gets lost.</p>
    <div id="auth-message" class="alert" role="alert"></div>
    <form id="auth-form" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input class="form-control" id="name" name="name" autocomplete="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" minlength="6" autocomplete="new-password" required>
      </div>
      <div id="otp-wrap">
        <div class="form-group mb-2">
          <label for="otp">Email OTP</label>
          <input type="text" class="form-control" id="otp" name="otp" inputmode="numeric" maxlength="6" placeholder="Enter 6-digit OTP">
        </div>
        <div class="form-group">
          <button id="send-otp-btn" type="button" class="btn btn-outline-info btn-sm">Send OTP</button>
          <small class="d-block muted mt-1">Enter your name and email, then verify OTP before creating account.</small>
        </div>
      </div>
      <button id="submit-btn" type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>
    <div class="d-flex justify-content-between align-items-center mt-3">
      <button id="toggle-mode" class="btn btn-link btn-sm p-0">Already have an account? Log in</button>
      <a href="/" class="btn btn-link btn-sm p-0">Home</a>
    </div>
  </div>
  <script src="/signup.js"></script>
</body>
</html>
